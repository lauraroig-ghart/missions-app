


<section class="child-hero">

    <div class="child-info">

        <div class="child-avatar">
            🎮
        </div>

        <div>

            <h1> {{ user.name }} </h1>

            <p>La teva consola de missions t'està esperant.</p>

        </div>

    </div>

    <div class="hero-progress">

        <div class="player-stats">

            <div>
                🏆
                <strong>{{ user.level }}</strong>
                <small>Nivell</small>
            </div>
            <div>
                ⭐
                <strong>{{ user.points }}</strong>
                <small>XP</small>
            </div>   
            <div>
                💰
                <strong>{{ user.coins }}</strong>
                <small>Monedes</small>
            </div>

            <div>
                🔥
                <strong>{{ user.streak }}</strong>
                <small>Ratxa</small>
            </div>
        </div>


        <div class="level-progress">

            <div class="progress-bar">
                <div class="progress-fill"
                    style="width: {{ user.level_progress }}%">
                </div>
            </div>

            <small>
                {{ user.level_progress }}% fins al següent nivell
            </small>

        </div>
    </div>
    <div class="hero-level">

        <span>Nivell {{ user.level }}</span>

        <span>{{ user.points }} XP</span>

    </div>

    <div class="progress-ui">

        <div class="progress-ui-value" style="width: {{ (user.points % 100) }}%;"></div>

    </div>


</section>
